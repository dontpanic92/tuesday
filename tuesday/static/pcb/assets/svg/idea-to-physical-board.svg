<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">从想法到物理电路板的工程闭环</title>
  <desc id="desc">用户问题依次转化为工程规格、原理图、PCB、制造装配和实物验证，验证结果可反馈到前面任一设计阶段。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#0b5cab"/>
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI","Noto Sans CJK SC",sans-serif;fill:#17202a}
      .box{fill:#fff;stroke:#0b5cab;stroke-width:2}
      .step{font-size:18px;font-weight:700;text-anchor:middle}
      .sub{font-size:13px;fill:#586474;text-anchor:middle}
      .flow{fill:none;stroke:#0b5cab;stroke-width:3;marker-end:url(#arrow)}
      .feedback{fill:none;stroke:#9a5b00;stroke-width:3;stroke-dasharray:8 6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" rx="18" fill="#f7fafc"/>
  <text x="480" y="42" font-size="24" font-weight="700" text-anchor="middle">从问题到产品：可追踪的设计与验证链</text>
  <g>
    <rect class="box" x="35" y="130" width="130" height="100" rx="12"/>
    <text class="step" x="100" y="172">用户问题</text>
    <text class="sub" x="100" y="199">需要解决什么？</text>
    <rect class="box" x="190" y="130" width="130" height="100" rx="12"/>
    <text class="step" x="255" y="172">工程规格</text>
    <text class="sub" x="255" y="199">边界与判据</text>
    <rect class="box" x="345" y="130" width="130" height="100" rx="12"/>
    <text class="step" x="410" y="172">原理图</text>
    <text class="sub" x="410" y="199">逻辑连接</text>
    <rect class="box" x="500" y="130" width="130" height="100" rx="12"/>
    <text class="step" x="565" y="172">PCB</text>
    <text class="sub" x="565" y="199">物理实现</text>
    <rect class="box" x="655" y="130" width="130" height="100" rx="12"/>
    <text class="step" x="720" y="164">制造与</text>
    <text class="step" x="720" y="190">装配</text>
    <text class="sub" x="720" y="214">形成样板</text>
    <rect x="810" y="130" width="115" height="100" rx="12" fill="#eaf5ee" stroke="#247a45" stroke-width="2"/>
    <text class="step" x="867.5" y="164">实物验证</text>
    <text class="sub" x="867.5" y="191">测量、试验</text>
    <text class="sub" x="867.5" y="211">与记录</text>
  </g>
  <path class="flow" d="M165 180H188"/>
  <path class="flow" d="M320 180H343"/>
  <path class="flow" d="M475 180H498"/>
  <path class="flow" d="M630 180H653"/>
  <path class="flow" d="M785 180H808"/>
  <path class="feedback" d="M868 232V355Q868 390 833 390H127Q100 390 100 363V233"/>
  <text x="480" y="365" font-size="17" font-weight="700" fill="#7a4700" text-anchor="middle">验证失败或新证据出现：回到受影响的最早阶段修订</text>
  <g transform="translate(72 435)">
    <circle cx="10" cy="10" r="8" fill="#247a45"/>
    <text x="28" y="16" font-size="15">每一阶段都保存输入、决定、输出与审核证据</text>
  </g>
</svg>
