<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">USB GPIO R1 系统功能框图</title>
  <desc id="desc">J1 USB-C 的数据经 U2 保护进入 U1 微控制器，VBUS 经 U3 生成 3V3_SYS。U1 控制 U4 和 U5 输出两路受控电源，并连接 J2 目标接口、J3 调试接口以及时钟复位状态电路。</desc>
  <defs>
    <marker id="signal-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#0b5cab"/>
    </marker>
    <marker id="power-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#b33a3a"/>
    </marker>
    <marker id="control-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#7a4ea3"/>
    </marker>
    <style>
      text{font-family:system-ui,-apple-system,"Segoe UI","Noto Sans CJK SC",sans-serif;fill:#17202a}
      .block{fill:#fff;stroke:#34495e;stroke-width:2}
      .title{font-size:18px;font-weight:700;text-anchor:middle}
      .sub{font-size:13px;fill:#586474;text-anchor:middle}
      .signal{fill:none;stroke:#0b5cab;stroke-width:3;marker-end:url(#signal-arrow)}
      .power{fill:none;stroke:#b33a3a;stroke-width:4;marker-end:url(#power-arrow)}
      .control{fill:none;stroke:#7a4ea3;stroke-width:3;stroke-dasharray:7 5;marker-end:url(#control-arrow)}
      .net{font-size:13px;font-weight:700}
    </style>
  </defs>
  <rect width="1000" height="620" rx="18" fill="#f7fafc"/>
  <text x="500" y="38" font-size="24" font-weight="700" text-anchor="middle">USB GPIO R1：功能块与主要跨块连接</text>
  <g>
    <rect class="block" x="35" y="210" width="145" height="120" rx="14"/>
    <text class="title" x="107.5" y="253">J1 USB-C</text><text class="sub" x="107.5" y="280">VBUS、D+、D−</text><text class="sub" x="107.5" y="302">CC1 / CC2</text>
    <rect class="block" x="235" y="105" width="155" height="105" rx="14"/>
    <text class="title" x="312.5" y="145">U2 USB 保护</text><text class="sub" x="312.5" y="172">ESD 与串联电阻</text>
    <rect x="445" y="175" width="180" height="155" rx="14" fill="#eef6ff" stroke="#0b5cab" stroke-width="3"/>
    <text class="title" x="535" y="220">U1 MCU</text><text class="sub" x="535" y="249">USB 设备与控制核心</text><text class="sub" x="535" y="275">GPIO / PWM / UART</text><text class="sub" x="535" y="301">EN_5V / EN_3V3</text>
    <rect class="block" x="805" y="185" width="160" height="160" rx="14"/>
    <text class="title" x="885" y="230">J2 目标接口</text><text class="sub" x="885" y="258">GPIO / PWM / UART</text><text class="sub" x="885" y="284">5V_SW / 3V3_SW</text><text class="sub" x="885" y="310">GND / NRST</text>
    <rect class="block" x="445" y="65" width="180" height="78" rx="14"/>
    <text class="title" x="535" y="97">时钟 / 复位 / 状态</text><text class="sub" x="535" y="121">Y1、NRST、LED</text>
    <rect class="block" x="675" y="65" width="135" height="78" rx="14"/>
    <text class="title" x="742.5" y="97">J3 调试</text><text class="sub" x="742.5" y="121">SWD / NRST</text>
    <rect class="block" x="235" y="385" width="155" height="110" rx="14"/>
    <text class="title" x="312.5" y="425">U3 Buck</text><text class="sub" x="312.5" y="452">VBUS_IN → 3V3_SYS</text><text class="sub" x="312.5" y="475">L1 与反馈网络</text>
    <rect class="block" x="485" y="400" width="145" height="100" rx="14"/>
    <text class="title" x="557.5" y="438">U4 5 V 开关</text><text class="sub" x="557.5" y="465">VBUS → 5V_SW</text>
    <rect class="block" x="670" y="400" width="145" height="100" rx="14"/>
    <text class="title" x="742.5" y="438">U5 3.3 V 开关</text><text class="sub" x="742.5" y="465">3V3_SYS → 3V3_SW</text>
  </g>
  <path class="signal" d="M180 245L235 175"/>
  <text class="net" x="188" y="190" fill="#0b5cab">D+ / D−</text>
  <path class="signal" d="M390 158L445 220"/>
  <path class="signal" d="M625 255H805"/>
  <text class="net" x="715" y="242" fill="#0b5cab" text-anchor="middle">GPIO / PWM / UART</text>
  <path class="signal" d="M625 205L675 125"/>
  <path class="signal" d="M535 175V145"/>
  <path class="power" d="M108 330V440H235"/>
  <text class="net" x="145" y="425" fill="#9c2424">VBUS_IN</text>
  <path class="power" d="M390 440H442V340H535V330"/>
  <text class="net" x="425" y="426" fill="#9c2424">3V3_SYS</text>
  <path class="power" d="M180 300H210V555H557V500"/>
  <path class="power" d="M390 470V555H742V500"/>
  <path class="power" d="M630 450H655V365H845V345"/>
  <text class="net" x="650" y="385" fill="#9c2424">5V_SW</text>
  <path class="power" d="M815 450H845V345"/>
  <text class="net" x="855" y="390" fill="#9c2424">3V3_SW</text>
  <path class="control" d="M535 330V365H557V400"/>
  <path class="control" d="M570 330V365H742V400"/>
  <text class="net" x="635" y="355" fill="#7a4ea3">使能控制</text>
  <g transform="translate(250 580)">
    <line x1="0" y1="0" x2="45" y2="0" stroke="#0b5cab" stroke-width="3"/><text x="55" y="5" font-size="13">信号</text>
    <line x1="130" y1="0" x2="175" y2="0" stroke="#b33a3a" stroke-width="4"/><text x="185" y="5" font-size="13">功率</text>
    <line x1="260" y1="0" x2="305" y2="0" stroke="#7a4ea3" stroke-width="3" stroke-dasharray="7 5"/><text x="315" y="5" font-size="13">控制</text>
  </g>
</svg>
